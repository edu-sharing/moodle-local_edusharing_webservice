
services:
  mariadb:
    image: docker.io/bitnami/mariadb:latest
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_moodle
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
  moodle:
    ## image: dockerio.mirror.docker.edu-sharing.com/bitnami/moodle:4.5.4
    ## For local testing use build context:
    build:
       context: .
    ports:
      - '11112:8080'
      - '8443:443'
    environment:
      - BITNAMI_DEBUG=true
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_NAME=bitnami_moodle
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - EDUSHARING_WEBSERVICE_USER=rendering
      - EDUSHARING_WEBSERVICE_PASSWORD=Rendering_1
      - EDUSHARING_REPOSITORY_PROT=https
      - EDUSHARING_REPOSITORY_PORT=443
      - EDUSHARING_REPOSITORY_HOST=repository.10-0.enterprise.edu.edu-sharing.de
      - EDUSHARING_REPOSITORY_USERNAME=admin
      - EDUSHARING_REPOSITORY_PASSWORD=asfdasdasd
      - EDUSHARING_MOODLE_HOST=localhost
      - EDUSHARING_MOODLE_HOST_ALIASES=*
      - EDUSHARING_COURSE_MAX_SIZE=1024M
    depends_on:
      - mariadb
## For local testing with volume
 ##   volumes:
 ##     - ./../../mod/edusharing:/edusharing/mod_edusharing
